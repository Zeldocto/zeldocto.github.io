<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Calculator</title>
  <link rel="icon" type="image/x-icon" href="../assets/icons/favicon.ico">
  <style>
    @font-face {
      font-family: 'Delfino';
      src: url('../assets/fonts/Delfino.ttf') format('truetype');
      font-display: swap;
    }
    @font-face {
      font-family: 'SMSScript';
      src: url('../assets/fonts/SMSScript.ttf') format('truetype');
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Delfino', Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #121212;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 400px;
      padding: 20px;
      background: #1e1e1e;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    }

    .title-section {
      text-align: center;
      margin-bottom: 20px;
    }

    h1, h2 {
      color: #ffffff;
      margin: 0;
    }

    h2 {
      margin-top: 10px;
      font-size: 1.1em;
    }

    .inputRow {
      display: flex;
      flex-direction: column;
      margin: 10px 0;
    }

    .inputRow label {
      font-size: 14px;
      margin-bottom: 4px;
      color: #ccc;
    }

    input.timeInput {
      width: 100%;
      padding: 8px;
      border: 1px solid #555;
      border-radius: 4px;
      font-family: SMSScript, Arial, sans-serif;
      font-size: 14px;
      background-color: #2a2a2a;
      color: #fff;
    }

    button {
      margin-top: 15px;
      padding: 10px 16px;
      font-family: 'Delfino', Arial, sans-serif;
      font-size: 16px;
      cursor: pointer;
      border: none;
      background-color: #4CAF50;
      color: white;
      border-radius: 4px;
      width: 100%;
    }

    button:hover {
      background-color: #45a049;
    }

    #total {
      margin-top: 15px;
      font-weight: bold;
      font-size: 16px;
      text-align: center;
      color: #fff;
    }

    .divider {
      border: none;
      border-top: 1px solid #333;
      margin: 20px 0;
    }

    .section-title {
      text-align: center;
      font-size: 1.1em;
      color: #fff;
      margin: 0 0 10px 0;
    }

    #difference {
      margin-top: 15px;
      font-weight: bold;
      font-size: 16px;
      text-align: center;
      color: #fff;
    }

    .home-link {
      position: absolute;
      top: 10px;
      left: 10px;
      font-family: 'Delfino', Arial, sans-serif;
      font-size: 36px;
      color: white;
      text-decoration: none;
      z-index: 2;
      text-shadow: 2px 2px 2px #000;
      transition: all 0.2s ease;
    }

    .home-link:hover {
      color: #bbb;
      transform: scale(1.05);
    }

    .home-link:active {
      transform: scale(0.95);
    }

    @media (min-width: 600px) {
      .inputRow {
        flex-direction: row;
        align-items: center;
      }
      .inputRow label {
        width: 100px;
        margin-bottom: 0;
        margin-right: 8px;
      }
      input.timeInput {
        width: 160px;
      }
      button {
        width: auto;
        display: block;
        margin: 15px auto 0;
      }
    }
  </style>
</head>
<body>
  <a class="home-link" href="/">⌂</a>
  <div class="container">
    <div class="title-section">
      <h1>World Calculator</h1>
      <h2>Enter Times</h2>
    </div>
    <div id="inputs">
      <div class="inputRow"><label for="seg1">Bianco I:</label><input id="seg1" type="text" class="timeInput" placeholder="00:00.000"></div>
      <div class="inputRow"><label for="seg2">Gelato:</label><input id="seg2" type="text" class="timeInput" placeholder="00:00.000"></div>
      <div class="inputRow"><label for="seg3">Pianta:</label><input id="seg3" type="text" class="timeInput" placeholder="00:00.000"></div>
      <div class="inputRow"><label for="seg4">Pinna:</label><input id="seg4" type="text" class="timeInput" placeholder="00:00.000"></div>
      <div class="inputRow"><label for="seg5">Ricco:</label><input id="seg5" type="text" class="timeInput" placeholder="00:00.000"></div>
      <div class="inputRow"><label for="seg6">Bianco II:</label><input id="seg6" type="text" class="timeInput" placeholder="00:00.000"></div>
      <div class="inputRow"><label for="seg7">Sirena:</label><input id="seg7" type="text" class="timeInput" placeholder="00:00.000"></div>
      <div class="inputRow"><label for="seg8">Noki:</label><input id="seg8" type="text" class="timeInput" placeholder="00:00.000"></div>
      <div class="inputRow"><label for="seg9">Corona:</label><input id="seg9" type="text" class="timeInput" placeholder="00:00.000"></div>
    </div>
    <button onclick="calculateTotal()">Calculate Total</button>
    <div id="total">Total Time: </div>

    <hr class="divider">

    <h2 class="section-title">PB vs SoB</h2>
    <div class="inputRow"><label for="pbInput">PB:</label><input id="pbInput" type="text" class="timeInput" placeholder="h:mm:ss"></div>
    <div class="inputRow"><label for="sobInput">SoB:</label><input id="sobInput" type="text" class="timeInput" placeholder="h:mm:ss"></div>
    <button onclick="calculateDifference()">Calculate Difference</button>
    <div id="difference">Difference: </div>
  </div>

  <script>
    function parseTime(str) {
      str = str.trim();
      if (!str) return 0;
      let [main, ms = '0'] = str.split('.');
      const parts = main.split(':').map(Number).reverse();
      let seconds = 0;
      if (parts.length >= 1) seconds += parts[0];       
      if (parts.length >= 2) seconds += parts[1] * 60;   
      if (parts.length >= 3) seconds += parts[2] * 3600; 
      let milliseconds = parseInt(ms.padEnd(3, '0').slice(0, 3)) || 0;
      return seconds * 1000 + milliseconds;
    }

    function formatTime(totalMs) {
      const totalSeconds = Math.floor(totalMs / 1000);
      const ms = totalMs % 1000;
      const h = Math.floor(totalSeconds / 3600);
      const m = Math.floor((totalSeconds % 3600) / 60);
      const s = totalSeconds % 60;
      return [
        String(h).padStart(2, '0'),
        String(m).padStart(2, '0'),
        String(s).padStart(2, '0')
      ].join(':') + '.' + String(ms).padStart(3, '0');
    }

    function parseHMS(str) {
      str = str.trim();
      if (!str) return 0;
      const parts = str.split(':').map(Number).reverse();
      let seconds = 0;
      if (parts.length >= 1) seconds += parts[0];       
      if (parts.length >= 2) seconds += parts[1] * 60;   
      if (parts.length >= 3) seconds += parts[2] * 3600; 
      return seconds * 1000;
    }

    function formatHMS(totalMs) {
      const totalSeconds = Math.round(totalMs / 1000);
      const h = Math.floor(totalSeconds / 3600);
      const m = Math.floor((totalSeconds % 3600) / 60);
      const s = totalSeconds % 60;
      return h + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }

    function calculateTotal() {
      const inputs = document.querySelectorAll('.timeInput');
      let totalMs = 0;
      inputs.forEach(input => {
        totalMs += parseTime(input.value);
      });
      document.getElementById('total').innerText = 'Total Time: ' + formatTime(totalMs);
    }

    function calculateDifference() {
      const pbMs = parseHMS(document.getElementById('pbInput').value);
      const sobMs = parseHMS(document.getElementById('sobInput').value);
      if (!pbMs && !sobMs) {
        document.getElementById('difference').innerText = 'Difference: —';
        return;
      }
      const diffMs = pbMs - sobMs;
      document.getElementById('difference').innerText = 'Difference: ' + formatHMS(diffMs);
    }
  </script>
</body>
</html>
